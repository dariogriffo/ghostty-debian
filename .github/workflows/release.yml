name: Build Ghostty for Debian

on:
  workflow_dispatch:
    inputs:
      ghostty_version:
        description: The version of ghostty to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true

permissions:
  contents: write

jobs:
  build-ghostty:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ghostty-debian
        uses: actions/checkout@v4

      - name: Validate upstream license permits paid distribution
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./validate_license.sh ${{ inputs.ghostty_version }}

      - name: Build Ghostty
        run: ./build_ghostty_debian.sh ${{ inputs.ghostty_version }} ${{ inputs.build_version }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: |
            ghostty_*.deb
            ghostty-dbgsym_*.deb

  build-src:
    name: Build Source Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ghostty-debian
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.ghostty_version }} ${{ inputs.build_version }}

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            ghostty_*.dsc
            ghostty_*.orig.tar.gz
            ghostty_*.debian.tar.xz

  release-ghostty:
    name: Release Ghostty for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-ghostty, build-src]
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Download source artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            ghostty_*.deb
            ghostty-dbgsym_*.deb
            ghostty_*.dsc
            ghostty_*.orig.tar.gz
            ghostty_*.debian.tar.xz
          name: ${{ inputs.ghostty_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.ghostty_version }}+${{ inputs.build_version }}
          fail_on_unmatched_files: true
